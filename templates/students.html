{% load static %}<!DOCTYPE html><html><head><title>Students</title><link rel="stylesheet" href="{% static "css/styles.css" %}"></head><body><div class="container"><h1>Students</h1><form method="get"><input name="q" placeholder="Search..."><button>Search</button></form>{% if students %}<table><tr><th>Username</th><th>Branch</th><th>Year</th><th>Company</th><th>Placed</th></tr>{% for s in students %}<tr><td>{{ s.user.username }}</td><td>{{ s.branch }}</td><td>{{ s.year }}</td><td>{{ s.company|default:"N/A" }}</td><td>{{ s.placed|yesno:"Yes,No" }}</td></tr>{% endfor %}</table>{% else %}<p>No students found</p>{% endif %}</div></body></html>
